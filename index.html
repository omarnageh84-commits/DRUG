<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث الصيدلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            padding: 20px;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            width: 100%;
            max-width: 650px;
            padding: 18px 25px;
            margin-bottom: 40px;
            font-size: 18px;
            border-radius: 20px;
            border: 2px solid #a29bfe;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            outline: none;
            text-align: center;
        }

        #results {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* اتنين جنب بعض في اللاب */
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        /* الجزء الجديد ده عشان الموبايل */
        @media (max-width: 600px) {
            #results {
                grid-template-columns: 1fr;
                /* كارت واحد في الموبايل */
            }
        }

        .card {
            padding: 25px;
            border-radius: 25px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.07);
            border: 3px solid #6c5ce7;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: 0.3s;
        }

        .card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: contain;
            margin-top: 10px;
            border-radius: 15px;
            background-color: #fdfdfd;
        }

        .card ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .card li {
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.6;
        }

        .name {
            font-weight: 900;
            font-size: 22px;
            color: #2d3436;
            margin-bottom: 5px;
        }

        .price {
            color: #e17055;
            font-weight: bold;
            background: #fff5f2;
            padding: 2px 8px;
            border-radius: 5px;
            display: inline-block;
        }

        .use {
            color: #00b894;
            font-weight: bold;
            background: #e6fffa;
            padding: 2px 8px;
            border-radius: 5px;
            display: inline-block;
        }

        .desc {
            color: #636e72;
            font-size: 15px;
        }
    </style>
</head>

<body>

    <input type="text" id="searchInput" placeholder="اكتب اسم الدوا هنا... 💊">
    <div id="results"></div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?gid=1037478451&single=true&output=csv';
        let drugsData = [];

        fetch(csvUrl)
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').filter(row => row.trim() !== '');
                drugsData = rows.slice(1).map(row => {
                    const cols = row.split(',');
                    return { name: cols[0]?.trim(), price: cols[1]?.trim(), category: cols[2]?.trim(), description: cols[3]?.trim(), imgUrl: cols[4]?.trim() };
                });
                displayData(drugsData);
            });

        function displayData(data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const imgTag = item.imgUrl ? `<img src="${item.imgUrl}" alt="${item.name}">` : '';

                card.innerHTML = `
                    <ul>
                        <li class="name">${item.name}</li>
                        <li><span class="price">💰 السعر: ${item.price} ج.م</span></li>
                        <li><span class="use">🎯 الاستخدام: ${item.category}</span></li>
                        <li class="desc">${item.description}</li>
                    </ul>
                    ${imgTag}
                `;
                resultsDiv.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            displayData(drugsData.filter(i => i.name.toLowerCase().includes(term) || i.category.toLowerCase().includes(term)));
        });
    </script>
</body>

</html>
