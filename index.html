<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدلية عمر</title>
    <!-- خط جميل من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            padding: 20px;
            background-color: #f7f9fc;
            text-align: center;
        }

        input {
            width: 100%;
            max-width: 650px;
            padding: 18px 25px;
            margin-bottom: 40px;
            border-radius: 25px;
            border: 1px solid #ddd;
            font-size: 16px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <input type="text" id="search" placeholder="اكتب اسم الدواء هنا...">
    <div id="results" class="grid-container"></div>

    <script>
        // رابط جوجل شيت بتاعك
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRT3FOhtVpAKoRrbXvJ2hA-D5b9px82Ayd9DtQ1YFZk2Vlrv9EWBMWLsKWAVqt1qZDN6oaragfAhMT5/pub?gid=0&single=true&output=csv';
        let allData = [];

        // سحب البيانات من الرابط
        fetch(sheetUrl)
            .then(res => res.text())
            .then(csv => {
                const rows = csv.split('\n');
                allData = rows.map(row => row.split(','));
                display(allData);
            });

        // عرض البيانات
        function display(data) {
            const container = document.getElementById('results');
            container.innerHTML = data.map(item => `
                <div class="card">
                    <p><strong>${item[0] || ''}</strong></p>
                    <p>${item[1] || ''}</p>
                </div>
            `).join('');
        }

        // البحث
        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(row => row.join(' ').toLowerCase().includes(val));
            display(filtered);
        });
    </script>
</body>

</html>
