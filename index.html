<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدلية عمر</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 10px;
            background-color: #f7f9fc;
            text-align: center;
        }

        input {
            width: 90%;
            max-width: 500px;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
        }

        #results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* إجبار عمودين قد بعض بالظبط */
            gap: 8px;
            /* مسافة صغيرة */
            padding: 5px;
        }

        .card {
            background: white;
            padding: 8px;
            border-radius: 10px;
            border: 2px solid #6667AB;
            overflow: hidden;
            /* عشان الكلام الطويل ميبوظش الكارت */
        }

        .card p {
            margin: 5px 0;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <input type="text" id="search" placeholder="اكتب اسم الدواء هنا...">
    <div id="results"></div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRT3FOhtVpAKoRrbXvJ2hA-D5b9px82Ayd9DtQ1YFZk2Vlrv9EWBMWLsKWAVqt1qZDN6oaragfAhMT5/pub?gid=0&single=true&output=csv';
        let allData = [];

        fetch(sheetUrl)
            .then(res => res.text())
            .then(csv => {
                const rows = csv.split('\n').filter(row => row.trim() !== "");
                allData = rows.map(row => row.split(','));
                display(allData);
            });

        function display(data) {
            const container = document.getElementById('results');
            container.innerHTML = data.map(item => `
                <div class="card">
                    <p style="font-weight:bold;">${item[0] || ''}</p>
                    <p>${item[1] || ''}</p>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(row => row.join(' ').toLowerCase().includes(val));
            display(filtered);
        });
    </script>
</body>

</html>
